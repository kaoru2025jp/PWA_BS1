<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貸借対照表シミュレーター（安定版）</title>

<style>
body {
  font-family: sans-serif;
  padding: 16px;
  background: #f7f9fc;
}
h2 { color: #2c3e50; }

.section {
  margin-top: 16px;
  padding: 10px;
  border-radius: 8px;
}
.structure { background: #eef5ff; }
.simulation { background: #fff6f6; }

input { margin: 5px; padding: 5px; }

table {
  border-collapse: collapse;
  margin-top: 20px;
  width: 100%;
  max-width: 520px;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

td, th {
  border: 1px solid #333;
  padding: 8px;
}
th { background: #eee; }

td:first-child { background: #eaf3ff; }
td:last-child { background: #fff5f5; }

#SX {
  font-weight: bold;
  font-size: 20px;
  color: #d35400;
}

#status {
  font-size: 12px;
  color: gray;
}
</style>
</head>

<body>

<h2>貸借対照表シミュレーター</h2>

<div class="section structure">
<h3>構造（固定）</h3>
B: <input id="B" type="number"><br>
O: <input id="O" type="number"><br>
T: <input id="T" type="number" step="0.01"><br>
</div>

<div class="section simulation">
<h3>シミュレーション</h3>
V:
<input id="V" type="range" min="0" max="1" step="0.01" value="0.5">
<span id="vValue">0.50</span>
</div>

<div id="status"></div>

<h3>貸借対照表</h3>
<table>
<tr><th>借方</th><th>貸方</th></tr>
<tr>
<td>流動資産: <span id="flowAssets">0</span></td>
<td>流動負債: <span id="flowLiabilities">0</span></td>
</tr>
<tr>
<td>固定資産: <span id="fixedAssets">0</span></td>
<td>資本金: <span id="capital">0</span></td>
</tr>
</table>

<h3>指標</h3>
T1: <span id="T1">0</span><br>
T2: <span id="T2">0</span><br>
流動比率: <span id="liquidity">0</span><br>

<h3>SX（構造）</h3>
SX: <span id="SX">0</span><br>
判定: <span id="safety">-</span>

<script>
const V = document.getElementById("V");

let requestId = 0; // ★ 最新通信だけ有効にする

// ======================
// SX
// ======================
function calcSX(B, O, T) {
  return B - O * T;
}

// ======================
// ローカル描画
// ======================
function renderLocal(B, Vv, O) {
  const flowAssets = B * Vv;
  const fixedAssets = Math.max(B - flowAssets, 0);
  const flowLiabilities = B * (1 - Vv);
  const capital = Math.max(B - flowLiabilities, 0);

  const T1 = fixedAssets / (O || 1);
  const T2 = capital / (O || 1);
  const liquidity = flowAssets / (flowLiabilities || 1);

  document.getElementById("flowAssets").innerText = flowAssets.toFixed(2);
  document.getElementById("flowLiabilities").innerText = flowLiabilities.toFixed(2);
  document.getElementById("fixedAssets").innerText = fixedAssets.toFixed(2);
  document.getElementById("capital").innerText = capital.toFixed(2);

  document.getElementById("T1").innerText = T1.toFixed(3);
  document.getElementById("T2").innerText = T2.toFixed(3);
  document.getElementById("liquidity").innerText = liquidity.toFixed(2);
}

// ======================
// GAS（安全版）
// ======================
async function syncGAS(B1, B, Vv, O) {
  const id = ++requestId; // ★ この通信のID

  try {
    const res = await fetch(
      "https://script.google.com/macros/s/AKfycbwmx2XJFWyqNg6D8m4LVikEQ9r4RJKXTv1Bj7u47MdsJkSLkd-PmaMUM3VtN9Q_ejfK8Q/exec",
      {
        method: "POST",
        body: JSON.stringify({ B1, B, V: Vv, O })
      }
    );

    const data = await res.json();

    // ★ 古い通信は無視
    if (id !== requestId) return;

    // ★ 有効な値だけ反映（ここが核心）
    if (
      typeof data.M1 === "number" &&
      typeof data.M2 === "number"
    ) {
      document.getElementById("flowAssets").innerText = data.M1.toFixed(2);
      document.getElementById("flowLiabilities").innerText = data.M2.toFixed(2);
    }

  } catch (e) {
    document.getElementById("status").innerText = "（通信不安定）";
  }
}

// ======================
// 更新
// ======================
function update() {
  const B = Number(document.getElementById("B").value || 0);
  const O = Number(document.getElementById("O").value || 1);
  const T = Number(document.getElementById("T").value || 0);
  const Vv = Number(V.value);

  document.getElementById("vValue").innerText = Vv.toFixed(2);

  renderLocal(B, Vv, O);

  const SX = calcSX(B, O, T);
  document.getElementById("SX").innerText = SX.toFixed(2);
  document.getElementById("safety").innerText = SX > 0 ? "健全" : "注意";

  const B1 = B * Vv - O;
  syncGAS(B1, B, Vv, O);
}

// ======================
V.addEventListener("input", update);
["B","O","T"].forEach(id => {
  document.getElementById(id).addEventListener("input", update);
});

update();
</script>

</body>
</html>
